name: gps_tracker
description: "A new Flutter project." 
publish_to: 'none'  
version: 1.0.0+1

environment:
  sdk: ^3.10.7 
dependencies:
  flutter:
    sdk: flutter 
  cupertino_icons: ^1.0.8
  firebase_database: ^12.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1  
  geolocator: ^14.0.2
  http: ^1.2.0
  uuid: ^4.3.3
  shared_preferences: ^2.3.5
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1  
  flutter_lints: ^6.0.0 

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "image/yellow_logo.png"  
  adaptive_icon_background: "#2d1e6b"    
  adaptive_icon_foreground: "image/yellow_logo.png"

flutter: 
  uses-material-design: true
 
  assets:
    - image/yellow_logo.png

