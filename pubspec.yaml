name: gps_tracker
description: "" 
publish_to: 'none'  
version: 1.7.2

environment:
  sdk: ^3.10.7 
dependencies:
  flutter:
    sdk: flutter 
  cupertino_icons: ^1.0.8
  firebase_database: ^12.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1  
  geolocator: ^14.0.2
  http: ^1.2.0
  uuid: ^4.3.3
  shared_preferences: ^2.3.5
  share_plus: ^12.0.2
  provider: ^6.1.1
  flutter_dotenv: ^6.0.1
  firebase_core: ^4.9.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1  
  flutter_lints: ^6.0.0 
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/momo.png"  
  adaptive_icon_background: "#000000"    
  adaptive_icon_foreground: "assets/images/momo.png"
  adaptive_icon_foreground_inset: 0

flutter: 
  uses-material-design: true
 
  assets:
    - assets/images/
    - .env
    - shorebird.yaml

